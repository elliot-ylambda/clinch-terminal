<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- near-black radial tile for depth -->
    <radialGradient id="bg" cx="0.5" cy="0.40" r="0.78">
      <stop offset="0" stop-color="#1E1E26"/>
      <stop offset="1" stop-color="#07070A"/>
    </radialGradient>
    <!-- luminous cyan -> mint mark -->
    <linearGradient id="mark" x1="300" y1="380" x2="700" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6FF0DA"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <!-- soft bloom behind the mark -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <!-- app tile (rounded square, Apple-ish padding) -->
  <rect x="92" y="92" width="840" height="840" rx="200" fill="url(#bg)"/>
  <!-- glow pass: blurred copy of the terminal-prompt mark -->
  <g filter="url(#glow)" opacity="0.75">
    <path d="M 326 384 L 534 512 L 326 640" stroke="url(#mark)" stroke-width="104" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="594" y="418" width="104" height="188" rx="46" fill="url(#mark)"/>
  </g>
  <!-- the mark: a terminal prompt chevron + cursor block -->
  <path d="M 326 384 L 534 512 L 326 640" stroke="url(#mark)" stroke-width="104" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="594" y="418" width="104" height="188" rx="46" fill="url(#mark)"/>
  <!-- faint rim light for a premium edge -->
  <rect x="94.5" y="94.5" width="835" height="835" rx="197.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="3"/>
</svg>
